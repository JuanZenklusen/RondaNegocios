{% extends "app_base.html" %}

{% block title %}Eliminar evento — RondaNegocios{% endblock %}

{% block app_content %}
<div class="glass-card p-4 p-md-5" style="max-width: 560px;">
  <div class="feature-icon mb-3" style="background: rgba(245,158,11,0.12); color: var(--warning);">
    <i class="fa-solid fa-triangle-exclamation"></i>
  </div>
  <h4 class="fw-bold mb-2">¿Eliminar este evento?</h4>
  <p class="text-secondary">
    Vas a eliminar <strong>{{ object.name }}</strong> y todo su programa, mesas y
    bloques horarios. Esta acción no se puede deshacer.
  </p>
  <form method="post" class="d-flex gap-2 mt-4">
    {% csrf_token %}
    <a href="{% url 'events:list' %}" class="btn btn-outline-dark rounded-3 px-4">Cancelar</a>
    <button type="submit" class="btn btn-danger rounded-3 px-4">
      <i class="fa-solid fa-trash me-1"></i> Sí, eliminar
    </button>
  </form>
</div>
{% endblock %}
