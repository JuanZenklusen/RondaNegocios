{% extends "accounts/auth_base.html" %}

{% block title %}Contraseña cambiada — RondaNegocios{% endblock %}

{% block auth_content %}
<div class="text-center">
  <div class="feature-icon mx-auto mb-3" style="background: rgba(16,185,129,0.12); color: var(--success);">
    <i class="fa-solid fa-circle-check"></i>
  </div>
  <h4 class="fw-bold mb-1">¡Listo!</h4>
  <p class="text-secondary small mb-4">Tu contraseña se cambió correctamente.</p>
  <a href="{% url 'accounts:login' %}" class="btn btn-dark-glass w-100 py-2">
    <i class="fa-solid fa-right-to-bracket me-1"></i> Ingresar
  </a>
</div>
{% endblock %}
