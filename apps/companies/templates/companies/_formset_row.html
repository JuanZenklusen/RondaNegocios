{% comment %}Una fila genérica de formset (sirve para productos/servicios/necesidades).{% endcomment %}
<div class="formset-row border rounded-3 p-3 mb-2 bg-white bg-opacity-25">
  {{ form.id }}
  {% for field in form.visible_fields %}
    {% if field.name != "DELETE" %}
      <div class="mb-2">
        <label class="form-label small mb-1">{{ field.label }}</label>
        {{ field }}
        {% for error in field.errors %}
          <div class="field-error small">{{ error }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endfor %}
  <div class="text-end">
    <label class="small d-inline-flex align-items-center gap-1" style="color: #dc2626;">
      {{ form.DELETE }} Eliminar
    </label>
  </div>
</div>
