{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}RondaNegocios{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Plataforma de vinculación empresarial y rondas de negocios.{% endblock %}">

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome 6.4 -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Sistema de diseño -->
  <link href="{% static 'css/design-system.css' %}" rel="stylesheet">
  {% block extra_head %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Mensajes de Django -> SweetAlert2 (toasts) -->
  {% if messages %}
  <script>
    (function () {
      const Toast = Swal.mixin({
        toast: true,
        position: 'top-end',
        showConfirmButton: false,
        timer: 3500,
        timerProgressBar: true,
      });
      const messages = [
        {% for message in messages %}
        { text: "{{ message|escapejs }}", tag: "{{ message.tags|escapejs }}" },
        {% endfor %}
      ];
      const iconFor = (tag) => {
        if (tag.includes('error')) return 'error';
        if (tag.includes('success')) return 'success';
        if (tag.includes('warning')) return 'warning';
        return 'info';
      };
      messages.forEach((m) => Toast.fire({ icon: iconFor(m.tag), title: m.text }));
    })();
  </script>
  {% endif %}

  {% block extra_js %}{% endblock %}
</body>
</html>
